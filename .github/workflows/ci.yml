name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run test suite
        run: pytest -q

  package:
    name: Package Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Smoke test minimal install
        run: |
          python -m venv .venv-min
          . .venv-min/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import hexafe_groupstats as h
          print("exports_ok", hasattr(h, "analyze_metric"))
          print("pandas_optional", "analyze_dataframe" in h.__all__)
          PY

      - name: Smoke test pandas adapter
        run: |
          python -m venv .venv-pandas
          . .venv-pandas/bin/activate
          python -m pip install --upgrade pip
          python -m pip install pandas dist/*.whl
          python - <<'PY'
          import pandas as pd
          from hexafe_groupstats import analyze_dataframe
          df = pd.DataFrame(
              {
                  "metric": ["m1", "m1", "m1", "m1"],
                  "group": ["A", "A", "B", "B"],
                  "value": [1.0, 1.1, 2.0, 2.1],
              }
          )
          results = analyze_dataframe(df)
          print("results", len(results))
          PY

